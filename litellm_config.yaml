model_list:
  - model_name: claude-haiku-4-5
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_AI_KEY

  - model_name: claude-opus-4-7
    litellm_params:
      model: groq/qwen/qwen3-32b
      api_key: os.environ/GROQ_API_KEY

  - model_name: cb-fast
    litellm_params:
      model: cerebras/llama-3.3-70b
      api_key: os.environ/CEREBRAS_API_KEY
      api_base: https://api.cerebras.ai/v1

  - model_name: cb-small
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY
      api_base: https://api.cerebras.ai/v1

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_AI_KEY

  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GOOGLE_AI_KEY

  - model_name: or-free
    litellm_params:
      model: openrouter/openrouter/free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

litellm_settings:
  drop_params: true
  num_retries: 1
  request_timeout: 20
  retry_after: 2
  allowed_fails: 3
  cooldown_time: 30
  default_fallbacks: [or-free]

  fallbacks:
    - claude-haiku-4-5: [cb-small, gemini-flash-lite]
    - claude-haiku-4-5-20251001: [cb-small, gemini-flash-lite]
    - claude-sonnet-4-6: [cb-fast, gemini-flash]
    - claude-opus-4-7: [cb-fast, gemini-flash]
    - cb-small: [gemini-flash-lite]
    - cb-fast: [gemini-flash]
    - gemini-flash-lite: [or-free]
    - gemini-flash: [or-free]

  context_window_fallbacks:
    - claude-haiku-4-5: [claude-sonnet-4-6, claude-opus-4-7]
    - claude-haiku-4-5-20251001: [claude-sonnet-4-6, claude-opus-4-7]
    - claude-sonnet-4-6: [claude-opus-4-7, gemini-flash]
    - cb-small: [claude-sonnet-4-6]
    - cb-fast: [claude-opus-4-7]

router_settings:
  enable_pre_call_checks: true
  routing_strategy: simple-shuffle